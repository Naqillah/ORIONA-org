name: Optimize Images and Deploy

on:
  push:
    branches: [ main, master ]

jobs:
  optimize-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Install image optimization tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jpegoptim optipng

      - name: Optimize images
        run: |
          find . -type f \( -iname '*.jpg' -o -iname '*.jpeg' \) -print0 | xargs -0 -n1 jpegoptim --strip-all --all-progressive || true
          find . -type f -iname '*.png' -print0 | xargs -0 -n1 optipng -o2 || true

      - name: Commit optimized images (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No optimized images to commit"
          else
            git commit -m "chore: optimize images"
            git push
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
